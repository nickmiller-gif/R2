name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck · Test · Guards
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      # Remote typegen + drift require valid SUPABASE_* credentials in CI.
      # Keep remote checks opt-in (vars.REQUIRE_SUPABASE_REMOTE_CHECKS=true)
      # so PRs are not blocked by temporary token/project permission drift.
      REQUIRE_SUPABASE_REMOTE_CHECKS: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' && secrets.SUPABASE_PROJECT_REF != '' }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Resolve Supabase CLI version
        id: cli_version
        if: env.SUPABASE_ACCESS_TOKEN != ''
        run: echo "version=$(bash scripts/supabase-cli-version.sh)" >> "$GITHUB_OUTPUT"

      - name: Install Supabase CLI
        if: env.SUPABASE_ACCESS_TOKEN != ''
        uses: supabase/setup-cli@v2
        with:
          version: ${{ steps.cli_version.outputs.version }}

      - name: Install dependencies
        run: npm ci

      - name: Quality gate (typecheck · tests · imports · migrations · drift · typegen · security scan)
        run: npm run check
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Edge authz contract (optional)
        if: env.SUPABASE_ACCESS_TOKEN != ''
        env:
          EIGEN_SUPABASE_URL: https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co
          EIGEN_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          MEMBER_JWT: ${{ secrets.EDGE_CONTRACT_MEMBER_JWT }}
          OPERATOR_JWT: ${{ secrets.EDGE_CONTRACT_OPERATOR_JWT }}
        run: node scripts/edge-authz-contract-test.mjs
        continue-on-error: true

      - name: Coverage report
        run: npm run coverage

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always
