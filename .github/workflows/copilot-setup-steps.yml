name: 'Copilot Setup Steps'

# Manual / PR-only: `copilot_setup` is not available on all org/repo types and
# caused workflow-parse failures on normal pushes to main. Use workflow_dispatch
# to run this check when needed; main quality gate remains CI.
on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - package.json
      - package-lock.json

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Typecheck + unit tests
        run: npm run check
