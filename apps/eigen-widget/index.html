<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Eigen · R2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Serif:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./tokens.css" />
    <style>
      /* ============================================================
         R2 · Eigen / EigenX widget
         Production skin matched to R2-Demo.html — light clinical white.
         Twin dock (bottom-right), morph-to-workspace. Embedded mode
         shows the workspace inline (no dock).
         ============================================================ */

      /* -- Token bridge: map private --r2-* aliases to canonical tokens.css values.
         tokens.css is loaded above and defines :root (light) + .dark / [data-theme="dark"]
         (institutional-cartography dark). The --r2-* vars below resolve to whichever
         variant is active so all widget CSS stays unchanged. -- */
      :root {
        /* Surfaces / ink */
        --r2-bg:       var(--surface-ground);
        --r2-ink:      var(--ink-primary);
        --r2-ink-2:    oklch(0.35 0.04 250);
        --r2-muted:    var(--ink-muted);
        --r2-muted-2:  oklch(0.65 0.02 250);
        /* Borders */
        --r2-hair:     var(--border-hairline);
        --r2-hair-2:   oklch(0.82 0.01 80);
        /* Cartographic grid overlay (very low-opacity ink) */
        --r2-grid:     oklch(0.22 0.04 250 / 0.035);
        /* Brand / accent */
        --r2-eigen:    var(--ink-primary);
        --r2-eigenx:   var(--accent-mark);
        --r2-signal:   oklch(0.52 0.10 245);
        /* Radii + easing — unchanged */
        --r2-r-s:      6px;
        --r2-r-m:      10px;
        --r2-r-l:      16px;
        --r2-ease:     cubic-bezier(0.16, 1, 0.3, 1);
        --r2-morph:    cubic-bezier(0.2, 0.8, 0.2, 1);
        --r2-shadow:   0 1px 0 oklch(0.22 0.04 250 / 0.02), 0 18px 48px oklch(0.22 0.04 250 / 0.10);
        --r2-glass:    oklch(1 0 0 / 0.78);
        --r2-glow:     oklch(0.55 0.16 40 / 0.28);
        --r2-mesh-a:   oklch(0.88 0.06 250 / 0.45);
        --r2-mesh-b:   oklch(0.92 0.10 70 / 0.32);
        --r2-mesh-c:   oklch(0.94 0.06 150 / 0.22);
        /* Typography — institutional cartography stack */
        --r2-font-ui:      var(--font-ui);
        --r2-font-display: var(--font-display);
        --r2-font-mono:    var(--font-mono);
      }

      /* Dark variant: tokens.css already sets --surface-ground → deep navy, etc.
         Only aliases that cannot rely on tokens.css vars need explicit overrides. */
      [data-theme="dark"] {
        --r2-ink-2:   oklch(0.80 0.02 80);
        --r2-muted-2: oklch(0.55 0.02 80);
        --r2-hair-2:  oklch(0.28 0.02 250);
        --r2-grid:    oklch(0.94 0.02 80 / 0.04);
        --r2-shadow:  0 1px 0 oklch(0 0 0 / 0.15), 0 18px 48px oklch(0 0 0 / 0.45);
        --r2-glass:   oklch(0.22 0.02 250 / 0.82);
        --r2-glow:    oklch(0.82 0.14 70 / 0.22);
        --r2-mesh-a:  oklch(0.28 0.08 250 / 0.55);
        --r2-mesh-b:  oklch(0.30 0.10 70 / 0.35);
        --r2-mesh-c:  oklch(0.26 0.06 150 / 0.25);
      }

      /* Dark overrides for elements with hardcoded light-mode colors */
      [data-theme="dark"] .citation-chip:hover,
      [data-theme="dark"] .tool-disclosure > button:hover {
        background: oklch(0.28 0.02 250);
      }
      [data-theme="dark"] .tool-disclosure pre,
      [data-theme="dark"] .chunk-preview {
        background: oklch(0.20 0.02 250);
        border-color: var(--border-hairline);
        color: var(--ink-primary);
      }
      [data-theme="dark"] .feedback button.is-active {
        background: oklch(0.25 0.02 250);
      }
      [data-theme="dark"] .tier-a,
      [data-theme="dark"] .tier-b {
        background: oklch(0.25 0.10 150);
        color: oklch(0.78 0.14 150);
      }
      [data-theme="dark"] .tier-c {
        background: oklch(0.25 0.08 70);
        color: oklch(0.82 0.14 70);
      }
      [data-theme="dark"] .tier-d {
        background: oklch(0.22 0.02 250);
        color: var(--ink-muted);
      }
      [data-theme="dark"] .state-banner {
        background: oklch(0.22 0.08 40);
        border-color: oklch(0.35 0.12 40);
        color: oklch(0.82 0.14 70);
      }
      [data-theme="dark"] .ws-mode.active-eigenx {
        background: oklch(0.22 0.02 250);
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: transparent;
        color: var(--r2-ink);
        font-family: var(--r2-font-ui);
        font-feature-settings: "ss01", "cv11";
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-size: 13.5px;
      }

      /* ---------- Backdrop ---------- */
      .backdrop {
        position: fixed;
        inset: 0;
        background: rgba(10, 10, 13, 0.32);
        backdrop-filter: blur(3px) saturate(1.15);
        -webkit-backdrop-filter: blur(3px) saturate(1.15);
        opacity: 0;
        pointer-events: none;
        transition: opacity 280ms var(--r2-ease);
        z-index: 40;
      }
      .backdrop.open {
        opacity: 1;
        pointer-events: auto;
      }

      /* ---------- Twin App Dock ---------- */
      .app-dock {
        position: fixed;
        right: 24px;
        bottom: 24px;
        display: flex;
        gap: 10px;
        align-items: flex-end;
        z-index: 45;
      }

      .app-button {
        position: relative;
        width: 68px;
        height: 68px;
        padding: 0;
        border: 1px solid oklch(1 0 0 / 0.12);
        border-radius: 20px;
        background: linear-gradient(145deg, #121218 0%, #0A0A0D 100%);
        color: #fff;
        cursor: pointer;
        overflow: hidden;
        display: grid;
        place-items: center;
        box-shadow:
          0 0 0 1px oklch(1 0 0 / 0.04),
          0 12px 32px oklch(0 0 0 / 0.28),
          0 0 24px var(--r2-glow);
        transition: transform 220ms var(--r2-ease),
                    box-shadow 220ms var(--r2-ease),
                    border-color 220ms var(--r2-ease);
      }
      .app-button::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: radial-gradient(circle at 30% 20%, oklch(1 0 0 / 0.12), transparent 55%);
        pointer-events: none;
      }
      .app-button:hover {
        transform: translateY(-3px) scale(1.02);
        box-shadow:
          0 0 0 1px oklch(1 0 0 / 0.08),
          0 18px 40px oklch(0 0 0 / 0.34),
          0 0 36px var(--r2-glow);
      }
      .app-button:focus-visible {
        outline: none;
        border-color: var(--r2-ink);
        box-shadow: 0 0 0 3px rgba(47,111,237,0.35), 0 10px 26px rgba(10,10,13,0.14);
      }
      .app-button svg {
        width: 100%;
        height: 100%;
        display: block;
      }
      .app-button .chip {
        position: absolute;
        left: 50%;
        top: -11px;
        transform: translateX(-50%);
        font-family: var(--r2-font-mono);
        font-size: 9.5px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        background: #fff;
        color: var(--r2-ink);
        border: 1px solid var(--r2-hair);
        border-radius: 999px;
        padding: 2px 7px;
        line-height: 1;
        white-space: nowrap;
        pointer-events: none;
      }
      .app-button.eigenx .chip {
        background: #0A0A0D;
        color: #EF9F27;
        border-color: #0A0A0D;
      }
      .app-button .label {
        position: absolute;
        left: 50%;
        bottom: -18px;
        transform: translateX(-50%);
        font-family: var(--r2-font-display);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: -0.005em;
        color: var(--r2-ink);
        white-space: nowrap;
        pointer-events: none;
      }

      .app-button.is-active {
        border-color: var(--r2-ink);
      }
      .app-button.is-active::after {
        content: "";
        position: absolute;
        inset: -4px;
        border-radius: 22px;
        border: 1px solid rgba(10,10,13,0.2);
        animation: r2-pulse 1.6s var(--r2-ease) infinite;
        pointer-events: none;
      }
      .app-button.eigenx.is-active::after {
        border-color: rgba(239,159,39,0.6);
      }
      @keyframes r2-pulse {
        0%   { opacity: 0.9; transform: scale(1); }
        70%  { opacity: 0;   transform: scale(1.25); }
        100% { opacity: 0;   transform: scale(1.25); }
      }

      .app-button.is-opening {
        opacity: 0;
        transition: opacity 120ms linear;
      }
      .app-dock.is-hidden { display: none !important; }

      /* ---------- Workspace (morph target) ---------- */
      .workspace {
        position: fixed;
        inset: 0;
        z-index: 50;
        pointer-events: none;
      }
      .workspace.open {
        pointer-events: auto;
      }

      /* The shell animates FROM the originating button's rect
         (written by widget.js as CSS vars) TO a centered workspace. */
      .workspace-shell {
        position: absolute;
        left: var(--from-x, 50%);
        top: var(--from-y, 50%);
        width: var(--from-w, 64px);
        height: var(--from-h, 64px);
        border-radius: 18px;
        background: var(--r2-glass);
        backdrop-filter: blur(18px) saturate(1.25);
        -webkit-backdrop-filter: blur(18px) saturate(1.25);
        border: 1px solid oklch(1 0 0 / 0.22);
        box-shadow: 0 0 0 rgba(10,10,13,0);
        overflow: hidden;
        opacity: 0;
        transform: scale(1);
        display: flex;
        flex-direction: column;
        isolation: isolate;
        transition:
          left   460ms var(--r2-morph),
          top    460ms var(--r2-morph),
          width  460ms var(--r2-morph),
          height 460ms var(--r2-morph),
          border-radius 460ms var(--r2-morph),
          box-shadow   460ms var(--r2-morph),
          opacity      220ms linear;
      }
      .workspace.open .workspace-shell {
        left:   max(16px, calc((100vw - 920px) / 2));
        top:    32px;
        width:  min(920px, calc(100vw - 32px));
        height: calc(100vh - 64px);
        border-radius: 22px;
        box-shadow:
          var(--r2-shadow),
          0 0 0 1px oklch(1 0 0 / 0.06),
          0 0 80px var(--r2-glow);
        opacity: 1;
      }

      /* Embedded mode — no dock, workspace fills the iframe. */
      body.embedded .backdrop,
      body.embedded .app-dock {
        display: none !important;
      }
      body.embedded .workspace {
        position: static;
        inset: auto;
        pointer-events: auto;
        height: 100vh;
      }
      body.embedded .workspace-shell {
        position: static;
        inset: auto;
        left: 0; top: 0;
        width: 100%;
        height: 100vh;
        border-radius: 0;
        border: 0;
        box-shadow: none;
        opacity: 1;
        transition: none;
      }
      body.embedded .ws-close {
        display: none;
      }

      /* ---------- Workspace head ---------- */
      .ws-head {
        flex: 0 0 auto;
        display: grid;
        grid-template-columns: 42px 1fr auto auto auto;
        grid-gap: 12px;
        align-items: center;
        padding: 16px 20px;
        border-bottom: 1px solid oklch(1 0 0 / 0.08);
        background: linear-gradient(180deg, oklch(1 0 0 / 0.06), transparent);
      }
      .ws-logo {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        overflow: hidden;
        display: grid;
        place-items: center;
        background: #0A0A0D;
      }
      .ws-logo svg { display: block; }
      .ws-title {
        display: flex;
        flex-direction: column;
        gap: 1px;
        min-width: 0;
      }
      .ws-title .name {
        font-family: var(--r2-font-display);
        font-size: 16px;
        font-weight: 600;
        letter-spacing: -0.018em;
        color: var(--r2-ink);
        line-height: 1.15;
      }
      .ws-entity-scope {
        font-family: var(--r2-font-mono);
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 5px 10px;
        border-radius: 999px;
        border: 1px solid var(--r2-eigenx);
        color: var(--r2-eigenx);
        background: oklch(0.82 0.14 70 / 0.12);
        max-width: 180px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .ws-title .sub {
        font-family: var(--r2-font-mono);
        font-size: 10.5px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--r2-muted);
      }
      .ws-mode {
        font-family: var(--r2-font-mono);
        font-size: 10.5px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 4px 9px;
        border-radius: 999px;
        border: 1px solid var(--r2-hair-2);
        color: var(--r2-ink);
        background: var(--r2-bg);
        line-height: 1;
      }
      .ws-mode.active-public  { border-color: var(--r2-ink); color: var(--r2-ink); }
      .ws-mode.active-eigenx  { border-color: var(--r2-eigenx); color: var(--r2-eigenx); background: #FFFDF7; }
      .ws-close {
        border: 1px solid var(--r2-hair-2);
        background: var(--r2-bg);
        color: var(--r2-ink);
        border-radius: 8px;
        width: 32px; height: 32px;
        display: grid;
        place-items: center;
        cursor: pointer;
        transition: background 160ms var(--r2-ease), border-color 160ms var(--r2-ease);
      }
      .ws-close:hover { background: #FAFAFB; border-color: var(--r2-ink); }
      .ws-close svg { width: 14px; height: 14px; }

      /* ---------- Workspace body ---------- */
      .ws-body {
        flex: 1 1 auto;
        min-height: 0;
        overflow: auto;
        padding: 22px 24px;
        background:
          radial-gradient(ellipse 80% 60% at 10% 0%, var(--r2-mesh-a), transparent 55%),
          radial-gradient(ellipse 70% 50% at 90% 10%, var(--r2-mesh-b), transparent 50%),
          radial-gradient(ellipse 60% 40% at 50% 100%, var(--r2-mesh-c), transparent 55%),
          var(--r2-bg);
        background-image:
          radial-gradient(ellipse 80% 60% at 10% 0%, var(--r2-mesh-a), transparent 55%),
          radial-gradient(ellipse 70% 50% at 90% 10%, var(--r2-mesh-b), transparent 50%),
          radial-gradient(ellipse 60% 40% at 50% 100%, var(--r2-mesh-c), transparent 55%),
          linear-gradient(to right, var(--r2-grid) 1px, transparent 1px),
          linear-gradient(to bottom, var(--r2-grid) 1px, transparent 1px);
        background-size: auto, auto, auto, 32px 32px, 32px 32px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }
      .ws-body.eigen-accent { /* subtle left rule for eigen replies in demo feel */ }

      .turn {
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-width: 100%;
      }
      .turn.user { align-items: flex-end; }
      .turn.assistant { align-items: flex-start; }
      .turn.system { align-items: flex-start; }

      .turn-row {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        max-width: 100%;
      }
      .turn.user .turn-row { flex-direction: row-reverse; }
      .turn-avatar {
        flex: 0 0 auto;
        width: 34px;
        height: 34px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        font-family: var(--r2-font-mono);
        font-size: 10px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        border: 1px solid var(--r2-hair-2);
        background: var(--r2-glass);
        color: var(--r2-muted);
      }
      .turn-avatar.assistant {
        background: #0A0A0D;
        color: #fff;
        border-color: #0A0A0D;
      }
      body.mode-eigenx .turn-avatar.assistant {
        background: linear-gradient(145deg, #EF9F27, #C77712);
        color: #0A0A0D;
        border-color: transparent;
      }
      .turn-avatar.user {
        background: oklch(0.94 0.02 250);
        color: var(--r2-ink);
      }
      .turn-content {
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-width: min(94%, 640px);
      }

      .msg {
        max-width: 100%;
        font-family: var(--r2-font-ui);
        font-size: 15px;
        line-height: 1.58;
        color: var(--r2-ink);
        letter-spacing: -0.008em;
        white-space: pre-wrap;
        word-wrap: break-word;
      }
      .turn.user .msg {
        background: var(--r2-glass);
        backdrop-filter: blur(10px);
        border: 1px solid oklch(1 0 0 / 0.14);
        border-radius: 16px 16px 4px 16px;
        padding: 12px 14px;
        box-shadow: 0 8px 24px oklch(0 0 0 / 0.06);
      }
      .turn.assistant .msg {
        background: var(--r2-glass);
        backdrop-filter: blur(10px);
        border: 1px solid oklch(1 0 0 / 0.12);
        border-left: 3px solid var(--r2-ink);
        border-radius: 4px 16px 16px 16px;
        padding: 12px 14px;
        box-shadow: 0 10px 28px oklch(0 0 0 / 0.07);
      }
      body.mode-eigenx .turn.assistant .msg {
        border-left-color: var(--r2-eigenx);
      }
      .turn.system .msg {
        font-family: var(--r2-font-mono);
        font-size: 11px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--r2-muted);
      }
      .streaming .msg::after {
        content: "";
        display: inline-block;
        width: 2px;
        height: 0.95em;
        margin-left: 2px;
        vertical-align: -2px;
        background: var(--r2-ink);
        animation: r2-cursor 900ms steps(2) infinite;
      }
      body.mode-eigenx .streaming .msg::after {
        background: var(--r2-eigenx);
      }
      @keyframes r2-cursor {
        0%, 49%  { opacity: 1; }
        50%, 100%{ opacity: 0.15; }
      }

      .turn-meta {
        font-family: var(--r2-font-mono);
        color: var(--r2-muted-2);
        font-size: 10.5px;
        letter-spacing: 0.04em;
      }
      .citations {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 2px;
      }
      .citation-chip {
        border: 1px solid var(--r2-hair-2);
        border-radius: 6px;
        background: var(--r2-bg);
        color: var(--r2-ink);
        font-family: var(--r2-font-mono);
        font-size: 10.5px;
        padding: 2px 7px;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
        transition: background 140ms var(--r2-ease), border-color 140ms var(--r2-ease);
      }
      .citation-chip:hover { background: #FAFAFB; border-color: var(--r2-ink); }
      .citation-chip:focus-visible {
        outline: none;
        box-shadow: 0 0 0 2px rgba(47,111,237,0.35);
      }
      .tier-badge {
        font-family: var(--r2-font-mono);
        font-size: 9.5px;
        border-radius: 4px;
        padding: 1px 4px;
        letter-spacing: 0.06em;
      }
      .tier-a, .tier-b {
        background: #E9F3EC;
        color: #14532D;
      }
      .tier-c {
        background: #FFF4EA;
        color: #7A4A08;
      }
      .tier-d {
        background: #F4F5F7;
        color: var(--r2-muted);
      }

      .tool-disclosure { width: 100%; }
      .tool-disclosure > button {
        border: 1px solid var(--r2-hair-2);
        background: var(--r2-bg);
        color: var(--r2-ink);
        border-radius: 6px;
        font-family: var(--r2-font-mono);
        font-size: 10.5px;
        padding: 3px 9px;
        cursor: pointer;
        letter-spacing: 0.02em;
        transition: background 140ms var(--r2-ease);
      }
      .tool-disclosure > button:hover { background: #FAFAFB; }
      .tool-disclosure pre {
        margin: 6px 0 0;
        background: #FAFAFB;
        border: 1px solid var(--r2-hair);
        border-radius: 8px;
        padding: 10px 12px;
        white-space: pre-wrap;
        color: var(--r2-ink-2);
        font-family: var(--r2-font-mono);
        font-size: 10.5px;
        line-height: 1.55;
        overflow-x: auto;
      }

      .feedback {
        display: inline-flex;
        gap: 4px;
      }
      .feedback button {
        border: 1px solid var(--r2-hair-2);
        background: var(--r2-bg);
        color: var(--r2-muted);
        border-radius: 6px;
        padding: 2px 8px;
        font-family: var(--r2-font-ui);
        font-size: 11px;
        cursor: pointer;
        transition: color 140ms var(--r2-ease), border-color 140ms var(--r2-ease);
      }
      .feedback button:hover { color: var(--r2-ink); border-color: var(--r2-ink); }
      .feedback button.is-active {
        color: var(--r2-ink);
        border-color: var(--r2-ink);
        background: #F4F5F7;
      }

      .state-banner {
        width: 100%;
        border: 1px solid #F1D3CF;
        border-radius: 8px;
        background: #FFF6F4;
        color: #7F1D1D;
        padding: 8px 12px;
        font-family: var(--r2-font-ui);
        font-size: 12px;
        letter-spacing: -0.005em;
      }
      .chunk-preview {
        margin-top: 4px;
        padding: 8px 10px;
        border: 1px solid var(--r2-hair);
        border-radius: 8px;
        background: #FAFAFB;
        font-family: var(--r2-font-mono);
        font-size: 11px;
        color: var(--r2-ink-2);
        letter-spacing: 0.01em;
      }

      /* ---------- Workspace foot (composer) ---------- */
      .ws-foot {
        flex: 0 0 auto;
        padding: 12px 18px 18px;
        border-top: 1px solid oklch(1 0 0 / 0.08);
        background: linear-gradient(0deg, oklch(1 0 0 / 0.05), transparent);
      }
      .ws-composer:focus-within {
        border-color: var(--r2-eigenx);
        box-shadow:
          inset 0 1px 0 oklch(1 0 0 / 0.06),
          0 0 0 3px oklch(0.82 0.14 70 / 0.22),
          0 12px 32px oklch(0 0 0 / 0.08);
      }
      .ws-composer .submit {
        border: none;
        background: linear-gradient(145deg, var(--r2-ink), oklch(0.18 0.04 250));
        color: #fff;
        cursor: pointer;
        box-shadow: 0 10px 24px oklch(0 0 0 / 0.18);
        transition: transform 180ms var(--r2-ease), box-shadow 180ms var(--r2-ease);
      }
      .ws-composer .submit:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 14px 28px oklch(0 0 0 / 0.22);
      }
      body.mode-eigenx .ws-composer .submit {
        background: linear-gradient(145deg, #F0AB40, #EF9F27);
        color: #0A0A0D;
        box-shadow: 0 10px 28px oklch(0.55 0.16 40 / 0.35);
      }
      .ws-composer .submit:disabled {
        cursor: not-allowed;
        opacity: 0.45;
        transform: none;
        box-shadow: none;
      }
      .ws-composer textarea::placeholder { color: var(--r2-muted-2); }

      /* Scrollbar */
      .ws-body::-webkit-scrollbar { width: 8px; height: 8px; }
      .ws-body::-webkit-scrollbar-thumb { background: var(--r2-hair-2); border-radius: 10px; }
      .ws-body::-webkit-scrollbar-track { background: transparent; }

      /* Setup / error view shares workspace look without dock */
      body.setup-error .app-dock { display: none; }
      body.setup-error .workspace {
        pointer-events: auto;
      }
      body.setup-error .workspace-shell {
        left:   max(16px, calc((100vw - 640px) / 2));
        top:    max(16px, calc((100vh - 320px) / 2));
        width:  min(640px, calc(100vw - 32px));
        height: min(320px, calc(100vh - 32px));
        border-radius: 18px;
        opacity: 1;
        box-shadow: var(--r2-shadow);
      }

      @media (max-width: 700px) {
        .app-dock { right: 14px; bottom: 14px; gap: 8px; }
        .app-button { width: 56px; height: 56px; border-radius: 16px; }
        .workspace.open .workspace-shell {
          left: 8px; top: 8px;
          width: calc(100vw - 16px);
          height: calc(100vh - 16px);
          border-radius: 14px;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .workspace-shell,
        .app-button,
        .app-button::after,
        .workspace-shell::before,
        .welcome-hero .hero-glow {
          transition-duration: 1ms !important;
          animation-duration: 1ms !important;
        }
      }

      /* ---------- Animated shell border ---------- */
      .workspace-shell::before {
        content: "";
        position: absolute;
        inset: -1px;
        border-radius: inherit;
        padding: 1px;
        background: linear-gradient(
          120deg,
          var(--r2-eigenx),
          oklch(0.52 0.10 245),
          transparent 40%,
          var(--r2-eigenx) 70%,
          oklch(0.82 0.14 70)
        );
        background-size: 220% 220%;
        animation: r2-border-shift 10s ease infinite;
        -webkit-mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
        z-index: 0;
        opacity: 0.85;
      }
      body.mode-eigenx .workspace-shell::before { opacity: 1; }
      @keyframes r2-border-shift {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
      }
      .ws-head, .ws-entity-ribbon, .ws-body, .ws-quick-prompts, .ws-foot {
        position: relative;
        z-index: 1;
      }

      /* ---------- Entity ribbon ---------- */
      .ws-entity-ribbon {
        flex: 0 0 auto;
        margin: 0 20px;
        padding: 8px 12px;
        border-radius: 12px;
        border: 1px solid oklch(0.82 0.14 70 / 0.35);
        background: oklch(0.82 0.14 70 / 0.08);
        color: var(--r2-ink);
        font-size: 12px;
        letter-spacing: -0.01em;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .ws-entity-ribbon::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--r2-eigenx);
        box-shadow: 0 0 12px var(--r2-glow);
        flex: 0 0 auto;
      }

      /* ---------- Welcome hero ---------- */
      .welcome-hero {
        margin: 8px auto 12px;
        max-width: 560px;
        text-align: center;
        padding: 28px 24px 22px;
        border-radius: 20px;
        border: 1px solid oklch(1 0 0 / 0.12);
        background: var(--r2-glass);
        backdrop-filter: blur(16px);
        box-shadow: 0 20px 50px oklch(0 0 0 / 0.08);
        position: relative;
        overflow: hidden;
      }
      .welcome-hero .hero-glow {
        position: absolute;
        inset: -40% -20%;
        background:
          radial-gradient(circle at 30% 30%, var(--r2-mesh-b), transparent 55%),
          radial-gradient(circle at 70% 60%, var(--r2-mesh-a), transparent 50%);
        opacity: 0.9;
        animation: r2-hero-drift 12s ease-in-out infinite;
        pointer-events: none;
      }
      @keyframes r2-hero-drift {
        0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
        50% { transform: translate3d(2%, -2%, 0) scale(1.04); }
      }
      .welcome-hero .hero-inner { position: relative; z-index: 1; }
      .welcome-hero h2 {
        margin: 0;
        font-family: var(--r2-font-display);
        font-size: clamp(22px, 3vw, 28px);
        font-weight: 600;
        letter-spacing: -0.03em;
        line-height: 1.15;
        background: linear-gradient(120deg, var(--r2-ink), var(--r2-eigenx));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      body.mode-eigenx .welcome-hero h2 {
        background: linear-gradient(120deg, var(--r2-ink), #F0AB40, var(--r2-eigenx));
        -webkit-background-clip: text;
        background-clip: text;
      }
      .welcome-hero p {
        margin: 10px 0 0;
        font-size: 14px;
        line-height: 1.55;
        color: var(--r2-muted);
      }

      /* ---------- Quick prompts ---------- */
      .ws-quick-prompts {
        flex: 0 0 auto;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 0 18px 10px;
      }
      .quick-prompt {
        border: 1px solid oklch(1 0 0 / 0.14);
        background: var(--r2-glass);
        backdrop-filter: blur(10px);
        color: var(--r2-ink);
        border-radius: 999px;
        padding: 7px 12px;
        font-size: 12px;
        letter-spacing: -0.01em;
        cursor: pointer;
        transition: transform 160ms var(--r2-ease), border-color 160ms var(--r2-ease), background 160ms var(--r2-ease);
      }
      .quick-prompt:hover {
        transform: translateY(-1px);
        border-color: var(--r2-eigenx);
        background: oklch(0.82 0.14 70 / 0.10);
      }

      /* ---------- Composer v2 ---------- */
      .ws-composer {
        display: flex;
        gap: 10px;
        align-items: flex-end;
        width: 100%;
        padding: 10px;
        border-radius: 18px;
        border: 1px solid oklch(1 0 0 / 0.14);
        background: var(--r2-glass);
        backdrop-filter: blur(14px);
        box-shadow: inset 0 1px 0 oklch(1 0 0 / 0.06), 0 12px 32px oklch(0 0 0 / 0.08);
      }
      .ws-composer textarea {
        flex: 1;
        border: 0;
        background: transparent;
        min-height: 44px;
        max-height: 160px;
        padding: 8px 4px;
        resize: none;
        font-family: var(--r2-font-ui);
        font-size: 15px;
        line-height: 1.45;
        color: var(--r2-ink);
      }
      .ws-composer textarea:focus { outline: none; }
      .ws-composer .submit {
        width: 44px;
        height: 44px;
        min-width: 44px;
        padding: 0;
        display: grid;
        place-items: center;
        border-radius: 14px;
      }

      /* ---------- Markdown in messages ---------- */
      .msg.md p { margin: 0 0 0.65em; }
      .msg.md p:last-child { margin-bottom: 0; }
      .msg.md ul.md-list {
        margin: 0.35em 0 0.65em;
        padding-left: 1.15em;
      }
      .msg.md code {
        font-family: var(--r2-font-mono);
        font-size: 0.92em;
        background: oklch(0 0 0 / 0.06);
        padding: 0.1em 0.35em;
        border-radius: 4px;
      }
      .msg.md a {
        color: var(--r2-eigenx);
        text-decoration: underline;
        text-underline-offset: 2px;
      }

      /* ---------- Typing indicator ---------- */
      .typing-indicator {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 1.2em;
      }
      .typing-indicator span {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: var(--r2-muted);
        animation: r2-typing 1.1s ease-in-out infinite;
      }
      .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
      .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }
      @keyframes r2-typing {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
        40% { transform: translateY(-3px); opacity: 1; }
      }
    </style>
    <!-- Theme init: apply data-theme before paint to avoid flash -->
    <script>
      (function () {
        var t; try { t = localStorage.getItem('r2-widget-theme'); } catch (e) {}
        var dark = t === 'dark' || (!t && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        if (!t && window.matchMedia) {
          window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
            document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
          });
        }
      })();
    </script>
  </head>
  <body>
    <!-- ================================================================
         SVG symbols — twin logos
         ================================================================ -->
    <svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
      <!-- Eigen: monochrome square + diagonal eigenvector -->
      <symbol id="eigen-mark" viewBox="0 0 200 200">
        <rect x="0" y="0" width="200" height="200" rx="22" fill="#0A0A0D"/>
        <line x1="100" y1="18" x2="100" y2="182" stroke="rgba(255,255,255,0.05)" stroke-width="0.6"/>
        <line x1="18" y1="100" x2="182" y2="100" stroke="rgba(255,255,255,0.05)" stroke-width="0.6"/>
        <rect x="40" y="40" width="120" height="120" fill="none" stroke="#FFFFFF" stroke-width="1.6"/>
        <rect x="52" y="52" width="96" height="96" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.8" stroke-dasharray="6 14"/>
        <line x1="66" y1="134" x2="142" y2="62" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="square"/>
        <polyline points="132,60 142,62 136,72" fill="none" stroke="#FFFFFF" stroke-width="1.4" stroke-linecap="square"/>
        <circle cx="100" cy="100" r="3" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
      </symbol>
      <!-- EigenX: amber circle + crossed X vectors -->
      <symbol id="eigenx-mark" viewBox="0 0 200 200">
        <rect x="0" y="0" width="200" height="200" rx="22" fill="#0A0A0D"/>
        <circle cx="100" cy="100" r="62" fill="none" stroke="#EF9F27" stroke-width="1.8"/>
        <line x1="62" y1="62" x2="138" y2="138" stroke="#EF9F27" stroke-width="2.2" stroke-linecap="square"/>
        <line x1="138" y1="62" x2="62" y2="138" stroke="#EF9F27" stroke-width="2.2" stroke-linecap="square"/>
        <polyline points="130,60 138,62 132,70" fill="none" stroke="#EF9F27" stroke-width="1.4" stroke-linecap="square"/>
        <polyline points="70,130 62,138 68,140" fill="none" stroke="#EF9F27" stroke-width="1.4" stroke-linecap="square"/>
        <polyline points="70,60 62,62 68,70"   fill="none" stroke="#EF9F27" stroke-width="1.4" stroke-linecap="square"/>
        <polyline points="130,140 138,138 132,130" fill="none" stroke="#EF9F27" stroke-width="1.4" stroke-linecap="square"/>
        <circle cx="100" cy="100" r="4" fill="#EF9F27"/>
      </symbol>
    </svg>

    <!-- ================================================================
         Backdrop + Twin App Dock
         ================================================================ -->
    <div id="backdrop" class="backdrop" aria-hidden="true"></div>

    <div id="app-dock" class="app-dock" role="toolbar" aria-label="Eigen apps">
      <button
        id="btn-eigen"
        class="app-button eigen"
        type="button"
        aria-label="Open Eigen — public commons"
        aria-controls="workspace"
        aria-expanded="false"
      >
        <span class="chip">Public</span>
        <svg viewBox="0 0 200 200" aria-hidden="true"><use href="#eigen-mark"/></svg>
        <span class="label">Eigen</span>
      </button>

      <button
        id="btn-eigenx"
        class="app-button eigenx"
        type="button"
        aria-label="Open EigenX — operator console"
        aria-controls="workspace"
        aria-expanded="false"
      >
        <span class="chip">Authed</span>
        <svg viewBox="0 0 200 200" aria-hidden="true"><use href="#eigenx-mark"/></svg>
        <span class="label">EigenX</span>
      </button>
    </div>

    <!-- ================================================================
         Morph Workspace — single shell, retargeted per app
         ================================================================ -->
    <div id="workspace" class="workspace" aria-hidden="true">
      <div
        id="ws-shell"
        class="workspace-shell"
        role="dialog"
        aria-modal="true"
        aria-labelledby="ws-title-name"
      >
        <div class="ws-head">
          <div id="ws-logo" class="ws-logo" aria-hidden="true">
            <svg viewBox="0 0 200 200" width="36" height="36"><use href="#eigen-mark"/></svg>
          </div>
          <div class="ws-title">
            <span id="ws-title-name" class="name">Eigen</span>
            <span id="ws-title-sub" class="sub">public commons</span>
          </div>
          <span id="ws-mode" class="ws-mode active-public">Public</span>
          <span id="ws-entity-scope" class="ws-entity-scope" hidden></span>
          <button
            id="ws-close"
            class="ws-close"
            type="button"
            aria-label="Close"
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M6 6l12 12M18 6L6 18"/>
            </svg>
          </button>
        </div>

        <div id="ws-entity-ribbon" class="ws-entity-ribbon" hidden></div>

        <div id="ws-body" class="ws-body" role="log" aria-live="polite"></div>

        <div id="ws-quick-prompts" class="ws-quick-prompts" aria-label="Suggested prompts"></div>

        <form id="ws-form" class="ws-foot" autocomplete="off">
          <div class="ws-composer">
            <textarea
              id="ws-input"
              rows="1"
              placeholder="Ask the commons…"
              required
            ></textarea>
            <button id="ws-submit" class="submit" type="submit" aria-label="Send message">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M5 12h14M13 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="./widget.js"></script>
  </body>
</html>
