<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="eigen-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#0A0A0D"/>

  <!-- Ambient glow -->
  <circle cx="100" cy="100" r="80" fill="url(#eigen-glow)"/>

  <!-- Ghost axes -->
  <line x1="100" y1="16" x2="100" y2="184" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
  <line x1="16" y1="100" x2="184" y2="100" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>

  <!-- Outer square -->
  <rect x="36" y="36" width="128" height="128" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- Inner dashed echo -->
  <rect x="48" y="48" width="104" height="104" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="0.8" stroke-dasharray="6 14"/>

  <!-- Eigenvector -->
  <line x1="64" y1="136" x2="144" y2="60" stroke="#FFFFFF" stroke-width="2" stroke-linecap="square"/>

  <!-- Arrow chevron -->
  <polyline points="134,58 144,60 138,70" fill="none" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="square"/>

  <!-- Scalar ticks -->
  <circle cx="84" cy="116" r="1.2" fill="rgba(255,255,255,0.2)"/>
  <circle cx="124" cy="76" r="1.2" fill="rgba(255,255,255,0.2)"/>

  <!-- Origin crosshair -->
  <circle cx="100" cy="100" r="3" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
  <line x1="93" y1="100" x2="89" y2="100" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
  <line x1="107" y1="100" x2="111" y2="100" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
  <line x1="100" y1="93" x2="100" y2="89" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
  <line x1="100" y1="107" x2="100" y2="111" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
</svg>