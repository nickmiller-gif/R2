name: CI

on:
  push:
    branches: ["main", "claude/**", "copilot/**"]
  pull_request:
    branches: ["main"]

jobs:
  check:
    name: Typecheck + Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

  no-alias-imports:
    name: No @/ imports in src/tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for @/ alias imports
        run: |
          if grep -r '@/' src/ tests/ --include='*.ts' -l; then
            echo "ERROR: Found @/ alias imports — use relative or package imports only"
            exit 1
          fi
          echo "OK: No @/ alias imports found"
