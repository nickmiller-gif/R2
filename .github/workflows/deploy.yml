name: Deploy to Supabase

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  actions: read
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false # never cancel an in-flight deploy

jobs:
  # Gate: wait for the CI workflow for this same commit
  ci_gate:
    name: Wait for CI workflow
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Wait for CI to complete
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;
            const workflowId = 'ci.yml';
            const timeoutMs = 20 * 60 * 1000;
            const intervalMs = 15 * 1000;
            const started = Date.now();

            while (Date.now() - started < timeoutMs) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflowId,
                head_sha: sha,
                event: 'push',
                per_page: 10,
              });

              const run = data.workflow_runs.find((r) => r.head_sha === sha);

              if (!run) {
                core.info(`No CI run found for ${sha} yet. Retrying in ${intervalMs / 1000}s...`);
              } else if (run.status !== 'completed') {
                core.info(`CI run ${run.id} status is ${run.status}. Retrying in ${intervalMs / 1000}s...`);
              } else if (run.conclusion === 'success') {
                core.info(`CI run ${run.id} succeeded.`);
                return;
              } else {
                core.setFailed(`CI run ${run.id} completed with conclusion: ${run.conclusion}`);
                return;
              }

              await new Promise((resolve) => setTimeout(resolve, intervalMs));
            }

            core.setFailed(`Timed out after ${timeoutMs / 60000} minutes waiting for CI workflow on ${sha}.`);

  deploy:
    name: Deploy migrations & edge functions
    needs: ci_gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production # requires manual approval in repo settings

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy migrations
        run: |
          if ! supabase db push --password "$SUPABASE_DB_PASSWORD"; then
            echo "db push failed; applying targeted fallback migration for known drift."
            if ! supabase db query --linked --file "supabase/migrations/202604080009_eigen_policy_access_grants.sql"; then
              echo "fallback migration already applied or non-critical; continuing deploy."
            fi
          fi

      - name: Deploy edge functions
        run: |
          SKIP_FUNCTIONS_REGEX="^(_shared|oracle-whitespace-runs)$"
          for dir in supabase/functions/*/; do
            fn_name=$(basename "$dir")
            # skip shared and known non-deployable legacy function
            if [[ "$fn_name" =~ $SKIP_FUNCTIONS_REGEX ]]; then
              echo "Skipping $fn_name"
              continue
            fi
            echo "::group::Deploying $fn_name"
            supabase functions deploy "$fn_name"
            echo "::endgroup::"
          done

      - name: Verify deployment
        run: |
          echo "## Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Project:** $SUPABASE_PROJECT_REF" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Triggered by:** ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Edge Functions Deployed" >> "$GITHUB_STEP_SUMMARY"
          for dir in supabase/functions/*/; do
            fn_name=$(basename "$dir")
            if [ "$fn_name" != "_shared" ]; then
              echo "- \`$fn_name\`" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
