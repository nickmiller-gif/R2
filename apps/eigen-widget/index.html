<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Eigen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Outfit:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --font-sans: 'DM Sans', system-ui, sans-serif;
        --font-display: 'Outfit', system-ui, sans-serif;
        --canvas: #f0f2f8;
        --surface: rgba(255, 255, 255, 0.82);
        --surface-solid: #ffffff;
        --border: rgba(148, 163, 184, 0.35);
        --muted: #64748b;
        --fg: #0f172a;
        --accent: #2563eb;
        --accent-hover: #1d4ed8;
        --user-bg: #2563eb;
        --bot-bg: rgba(255, 255, 255, 0.95);
        --shadow: 0 20px 50px -12px rgb(15 23 42 / 0.25);
        --shadow-fab: 0 8px 24px -6px rgb(37 99 235 / 0.45);
      }
      html[data-theme='dark'] {
        --canvas: #0a0c10;
        --surface: rgba(18, 21, 28, 0.88);
        --surface-solid: #12151c;
        --border: rgba(71, 85, 105, 0.5);
        --muted: #94a3b8;
        --fg: #f1f5f9;
        --accent: #60a5fa;
        --accent-hover: #93c5fd;
        --user-bg: #3b82f6;
        --bot-bg: rgba(26, 31, 42, 0.95);
        --shadow: 0 24px 56px -8px rgb(0 0 0 / 0.55);
        --shadow-fab: 0 8px 28px -4px rgb(96 165 250 / 0.35);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--font-sans);
        background: var(--canvas);
        color: var(--fg);
      }
      .backdrop {
        position: fixed;
        inset: 0;
        background: transparent;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.22s ease, background 0.22s ease;
      }
      .backdrop.open {
        pointer-events: auto;
        opacity: 1;
        background: rgb(15 23 42 / 0.18);
      }
      html[data-theme='dark'] .backdrop.open {
        background: rgb(0 0 0 / 0.45);
      }
      .launcher {
        position: fixed;
        bottom: 1.35rem;
        right: 1.35rem;
        z-index: 40;
        width: 3.5rem;
        height: 3.5rem;
        border: none;
        border-radius: 9999px;
        cursor: pointer;
        background: linear-gradient(145deg, var(--accent), #1d4ed8);
        color: #fff;
        font-size: 1.35rem;
        box-shadow: var(--shadow-fab);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }
      html[data-theme='dark'] .launcher {
        background: linear-gradient(145deg, var(--accent), #2563eb);
      }
      .launcher:hover {
        transform: scale(1.05);
      }
      .launcher:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
      }
      .launcher[aria-expanded='true'] {
        transform: rotate(90deg);
      }
      .panel {
        position: fixed;
        z-index: 50;
        right: 1rem;
        bottom: 5.5rem;
        width: min(100vw - 2rem, 22rem);
        max-height: min(70vh, 34rem);
        display: flex;
        flex-direction: column;
        border-radius: 1.15rem;
        border: 1px solid var(--border);
        background: var(--surface);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow: var(--shadow);
        overflow: hidden;
        opacity: 0;
        transform: translateY(12px) scale(0.97);
        pointer-events: none;
        transition: opacity 0.22s ease, transform 0.22s ease;
      }
      .panel.open {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: auto;
      }
      .head {
        flex-shrink: 0;
        padding: 0.85rem 1rem;
        border-bottom: 1px solid var(--border);
        background: var(--surface-solid);
      }
      .head h2 {
        margin: 0;
        font-family: var(--font-display);
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .head p {
        margin: 0.2rem 0 0;
        font-size: 0.72rem;
        color: var(--muted);
      }
      .chat {
        flex: 1;
        overflow: auto;
        padding: 0.75rem;
        background: transparent;
      }
      .msg {
        margin: 0.5rem 0;
        padding: 0.65rem 0.85rem;
        border-radius: 1rem;
        max-width: 92%;
        white-space: pre-wrap;
        font-size: 0.875rem;
        line-height: 1.45;
        animation: msg-in 0.22s ease;
      }
      @keyframes msg-in {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .user {
        margin-left: auto;
        background: var(--user-bg);
        color: #fff;
        border-bottom-right-radius: 0.35rem;
      }
      .bot {
        margin-right: auto;
        background: var(--bot-bg);
        border: 1px solid var(--border);
        color: var(--fg);
        border-bottom-left-radius: 0.35rem;
      }
      .meta {
        font-size: 0.7rem;
        color: var(--muted);
        margin-top: 0.45rem;
      }
      .foot {
        flex-shrink: 0;
        display: flex;
        gap: 0.5rem;
        padding: 0.65rem;
        border-top: 1px solid var(--border);
        background: var(--surface-solid);
      }
      .foot textarea {
        flex: 1;
        resize: none;
        min-height: 2.65rem;
        max-height: 6rem;
        padding: 0.55rem 0.75rem;
        border-radius: 0.75rem;
        border: 1px solid var(--border);
        background: var(--canvas);
        color: var(--fg);
        font-family: inherit;
        font-size: 0.875rem;
      }
      .foot textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 25%, transparent);
      }
      .foot button[type='submit'] {
        align-self: flex-end;
        min-width: 4.5rem;
        padding: 0.55rem 0.75rem;
        border: none;
        border-radius: 0.75rem;
        background: var(--accent);
        color: #fff;
        font-weight: 600;
        font-size: 0.8rem;
        cursor: pointer;
        transition: background 0.15s ease;
      }
      .foot button[type='submit']:hover {
        background: var(--accent-hover);
      }
      .foot button[type='submit']:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div id="backdrop" class="backdrop" aria-hidden="true"></div>
    <button type="button" id="launcher" class="launcher" aria-label="Open chat" aria-expanded="false">
      ✦
    </button>
    <div id="panel" class="panel" role="dialog" aria-modal="true" aria-labelledby="head-title" hidden>
      <div class="head">
        <h2 id="head-title">Eigen</h2>
        <p id="head-sub"></p>
      </div>
      <div class="chat" id="chat"></div>
      <form class="foot" id="form">
        <textarea id="input" placeholder="Ask a question…" required rows="1"></textarea>
        <button type="submit">Send</button>
      </form>
    </div>
    <script type="module" src="./widget.js"></script>
  </body>
</html>
