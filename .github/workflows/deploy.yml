name: Deploy to Supabase

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  actions: read
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false # never cancel an in-flight deploy

jobs:
  # Gate: wait for the CI workflow for this same commit
  ci_gate:
    name: Wait for CI workflow
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Wait for CI to complete
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;
            const workflowId = 'ci.yml';
            const timeoutMs = 20 * 60 * 1000;
            const intervalMs = 15 * 1000;
            const started = Date.now();

            while (Date.now() - started < timeoutMs) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflowId,
                head_sha: sha,
                event: 'push',
                per_page: 10,
              });

              const run = data.workflow_runs.find((r) => r.head_sha === sha);

              if (!run) {
                core.info(`No CI run found for ${sha} yet. Retrying in ${intervalMs / 1000}s...`);
              } else if (run.status !== 'completed') {
                core.info(`CI run ${run.id} status is ${run.status}. Retrying in ${intervalMs / 1000}s...`);
              } else if (run.conclusion === 'success') {
                core.info(`CI run ${run.id} succeeded.`);
                return;
              } else {
                core.setFailed(`CI run ${run.id} completed with conclusion: ${run.conclusion}`);
                return;
              }

              await new Promise((resolve) => setTimeout(resolve, intervalMs));
            }

            core.setFailed(`Timed out after ${timeoutMs / 60000} minutes waiting for CI workflow on ${sha}.`);

  deploy:
    name: Deploy migrations & edge functions
    needs: ci_gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production # requires manual approval in repo settings

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v6

      - name: Resolve Supabase CLI version
        id: cli_version
        # Reads the single source of truth so CI (typegen / drift checks) and
        # Deploy run the exact same CLI. April 2026 postmortem: when deploy was
        # pinned to 2.84.2 and CI typegen to 2.89.0, a wildcard-column schema
        # addition that 2.84 serialized differently made CI fail on drift while
        # deploy silently kept pushing, and the repo's database.types.ts drifted
        # from the live schema for eight merges in a row.
        run: |
          VERSION="$(bash scripts/supabase-cli-version.sh)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: ${{ steps.cli_version.outputs.version }}

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Report R2 migration sync state
        # The Supabase project zudslxucibosjwefojtm is shared with the `works.*`
        # schema apps. Those apps apply migrations via their own channels (their
        # CI / Dashboard), which writes to the same `supabase_migrations.schema_migrations`
        # table — so vanilla `supabase db push` from R2 hits the sync-guard:
        #   "Remote migration versions not found in local migrations directory"
        # Marking remote-only versions as `reverted` would fight the `works.*`
        # apps every cycle (see their next push would re-apply the same DDL).
        #
        # R2 instead applies its own migrations directly via the Supabase MCP
        # (`apply_migration`) out of band from CI. This step only reports the
        # sync state so reviewers can see which R2 migrations are still
        # unapplied (should be none in steady state) and spot drift early.
        #
        # See docs/production-deploy-checklist.md § "R2 migrations on a shared project"
        # for the operator runbook.
        run: |
          set -euo pipefail

          LOCAL_VERSIONS=$(ls supabase/migrations/*.sql 2>/dev/null \
            | xargs -n1 basename \
            | awk -F_ '{print $1}' \
            | sort -u)

          REMOTE_VERSIONS=$(supabase migration list --linked \
            | awk -F'|' 'NR > 3 && NF >= 2 { gsub(/^[ \t]+|[ \t]+$/, "", $2); if ($2 ~ /^[0-9]{12,14}$/) print $2 }' \
            | sort -u)

          LOCAL_UNAPPLIED=$(comm -23 <(echo "$LOCAL_VERSIONS") <(echo "$REMOTE_VERSIONS"))
          echo "### R2 migration sync" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -z "$LOCAL_UNAPPLIED" ]; then
            echo "All R2 migration files are already applied on the live project." | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "Unapplied R2 migration versions (apply via Supabase MCP \`apply_migration\` before this deploy is considered complete):" | tee -a "$GITHUB_STEP_SUMMARY"
            echo "$LOCAL_UNAPPLIED" | sed 's/^/  - /' | tee -a "$GITHUB_STEP_SUMMARY"
            echo ""
            echo "::warning title=Unapplied R2 migrations::Found $(echo "$LOCAL_UNAPPLIED" | wc -l | tr -d ' ') migration file(s) not yet in supabase_migrations.schema_migrations. Edge-function deploy will proceed but run-time behavior may depend on schema not yet in place."
          fi

      - name: Deploy edge functions
        run: |
          # `oracle-whitespace-runs` remains skipped until the Deno bundling blocker
          # called out in docs/production-deploy-checklist.md is resolved.
          SKIP_FUNCTIONS_REGEX="^(_shared|oracle-whitespace-runs)$"
          # Widget/public-facing functions accept unauthenticated requests
          NO_VERIFY_JWT_REGEX="^(eigen-widget-session|eigen-widget-chat|eigen-public-sources)$"
          for dir in supabase/functions/*/; do
            fn_name=$(basename "$dir")
            # skip shared and known non-deployable legacy function
            if [[ "$fn_name" =~ $SKIP_FUNCTIONS_REGEX ]]; then
              echo "Skipping $fn_name"
              continue
            fi
            echo "::group::Deploying $fn_name"
            if [[ "$fn_name" =~ $NO_VERIFY_JWT_REGEX ]]; then
              supabase functions deploy "$fn_name" --no-verify-jwt
            else
              supabase functions deploy "$fn_name"
            fi
            echo "::endgroup::"
          done

      - name: Verify deployment
        run: |
          echo "## Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Project:** $SUPABASE_PROJECT_REF" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Triggered by:** ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Edge Functions Deployed" >> "$GITHUB_STEP_SUMMARY"
          for dir in supabase/functions/*/; do
            fn_name=$(basename "$dir")
            if [ "$fn_name" != "_shared" ]; then
              echo "- \`$fn_name\`" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
