name: CI

on:
  push:
    branches: [main, "claude/**", "copilot/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck · Test · Lint · Migrations
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Check banned imports
        run: bash scripts/check-banned-imports.sh

      - name: Check migration sanity
        run: bash scripts/check-migrations.sh
