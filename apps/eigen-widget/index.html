<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Eigen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Serif:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./tokens.css" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--font-ui);
        background: transparent;
        color: var(--ink-primary);
        font-size: 13px;
      }
      .backdrop {
        position: fixed;
        inset: 0;
        background: rgb(0 0 0 / 0.24);
        opacity: 0;
        pointer-events: none;
        transition: opacity var(--motion-normal);
      }
      .backdrop.open {
        opacity: 1;
        pointer-events: auto;
      }
      .launcher {
        position: fixed;
        width: 56px;
        height: 56px;
        right: 24px;
        bottom: 24px;
        border-radius: var(--radius-full);
        border: 1px solid var(--border-hairline);
        background: var(--surface-ground);
        color: var(--ink-inverse);
        box-shadow: var(--shadow-md);
        display: grid;
        place-items: center;
        cursor: pointer;
        transition: transform var(--motion-fast), box-shadow var(--motion-fast);
      }
      .launcher:hover {
        transform: translateY(-1px);
        box-shadow: var(--shadow-lg);
      }
      .launcher:focus-visible,
      .close-btn:focus-visible,
      .tool-disclosure button:focus-visible,
      .citation-chip:focus-visible,
      textarea:focus-visible,
      .submit:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px var(--focus-ring);
      }
      .pulse-dot {
        position: absolute;
        top: 4px;
        right: 4px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent-mark);
        opacity: 0.7;
      }
      .panel {
        position: fixed;
        z-index: 50;
        right: 16px;
        bottom: 88px;
        width: min(100vw - 32px, 420px);
        height: min(100vh - 120px, 620px);
        border-radius: var(--radius-lg);
        background: var(--surface-plate);
        box-shadow: var(--shadow-lg);
        border: 1px solid var(--border-hairline);
        opacity: 0;
        transform: translateY(4px);
        pointer-events: none;
        display: flex;
        flex-direction: column;
        transition: opacity var(--motion-normal), transform var(--motion-normal);
      }
      .panel.open {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }
      .head {
        min-height: 52px;
        padding: var(--space-3) var(--space-4);
        display: flex;
        align-items: center;
        gap: var(--space-2);
        border-bottom: 1px solid var(--border-hairline);
      }
      .mode-badge {
        font-family: var(--font-label);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        border: 1px solid var(--border-hairline);
        border-radius: var(--radius-sm);
        padding: 2px 6px;
        color: var(--ink-primary);
        background: var(--surface-card);
      }
      .head-title-wrap {
        min-width: 0;
      }
      .head-title {
        margin: 0;
        font-family: var(--font-ui);
        font-size: 13px;
        color: var(--ink-primary);
      }
      .head-sub {
        margin: 0;
        color: var(--ink-muted);
        font-family: var(--font-caption);
        font-size: 11px;
      }
      .close-btn {
        margin-left: auto;
        border: 1px solid var(--border-hairline);
        background: var(--surface-card);
        color: var(--ink-primary);
        border-radius: var(--radius-sm);
        padding: 4px 6px;
        cursor: pointer;
      }
      .chat {
        flex: 1;
        overflow: auto;
        padding: var(--space-4);
        display: flex;
        flex-direction: column;
        gap: var(--space-4);
      }
      .turn {
        display: flex;
        flex-direction: column;
        gap: var(--space-2);
      }
      .turn.user {
        align-items: flex-end;
      }
      .turn.assistant {
        align-items: flex-start;
      }
      .msg {
        max-width: 95%;
        border-radius: var(--radius-md);
        font-size: 15px;
        line-height: 1.45;
        white-space: pre-wrap;
      }
      .turn.user .msg {
        background: var(--surface-card);
        color: var(--ink-primary);
        border: 1px solid var(--border-hairline);
        padding: var(--space-3);
        font-family: var(--font-body);
      }
      .turn.assistant .msg {
        color: var(--ink-primary);
        padding-left: var(--space-2);
        border-left: 1px solid var(--border-hairline);
        font-family: var(--font-body);
      }
      .streaming .msg::after {
        content: "";
        display: block;
        width: 2px;
        height: 1em;
        margin-top: 4px;
        background: var(--accent-primary);
        animation: cursorPulse 800ms linear infinite;
      }
      @keyframes cursorPulse {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0.2; }
      }
      .turn-meta {
        font-family: var(--font-caption);
        color: var(--ink-muted);
        font-size: 11px;
      }
      .citations {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-1);
      }
      .citation-chip {
        border: 1px solid var(--border-hairline);
        border-radius: var(--radius-sm);
        background: var(--surface-card);
        color: var(--ink-primary);
        font-family: var(--font-label);
        font-size: 11px;
        padding: 2px 6px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
      }
      .tier-badge {
        font-family: var(--font-mono);
        font-size: 11px;
        border-radius: var(--radius-sm);
        padding: 1px 4px;
      }
      .tier-a,
      .tier-b {
        background: color-mix(in oklch, var(--status-verified) 18%, transparent);
      }
      .tier-c {
        background: color-mix(in oklch, var(--status-tentative) 24%, transparent);
      }
      .tier-d {
        background: color-mix(in oklch, var(--status-unverified) 22%, transparent);
      }
      .tool-disclosure {
        width: 100%;
      }
      .tool-disclosure button {
        border: 1px solid var(--border-hairline);
        background: var(--surface-card);
        color: var(--ink-primary);
        border-radius: var(--radius-sm);
        font-family: var(--font-mono);
        font-size: 11px;
        padding: 3px 8px;
        cursor: pointer;
      }
      .tool-disclosure pre {
        margin: 6px 0 0;
        background: var(--surface-card);
        border: 1px solid var(--border-hairline);
        border-radius: var(--radius-md);
        padding: var(--space-2);
        white-space: pre-wrap;
        color: var(--ink-muted);
        font-family: var(--font-mono);
        font-size: 11px;
      }
      .feedback {
        display: inline-flex;
        gap: var(--space-1);
      }
      .feedback button {
        border: 1px solid var(--border-hairline);
        background: var(--surface-card);
        color: var(--ink-muted);
        border-radius: var(--radius-sm);
        padding: 2px 6px;
        font-family: var(--font-ui);
        font-size: 11px;
        cursor: pointer;
      }
      .feedback button.is-active {
        color: var(--ink-primary);
        border-color: var(--accent-primary);
      }
      .foot {
        border-top: 1px solid var(--border-hairline);
        padding: var(--space-3);
        display: flex;
        gap: var(--space-2);
      }
      textarea {
        flex: 1;
        resize: none;
        min-height: 44px;
        max-height: 130px;
        border-radius: var(--radius-md);
        border: 1px solid var(--border-hairline);
        background: var(--surface-card);
        color: var(--ink-primary);
        font-family: var(--font-body);
        font-size: 15px;
        line-height: 1.35;
        padding: var(--space-2) var(--space-3);
      }
      textarea::placeholder {
        color: var(--ink-muted);
      }
      .submit {
        border-radius: var(--radius-md);
        border: none;
        min-width: 68px;
        background: var(--accent-primary);
        color: var(--ink-inverse);
        font-family: var(--font-ui);
        cursor: pointer;
      }
      .submit:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }
      .state-banner {
        width: 100%;
        border: 1px solid color-mix(in oklch, var(--status-error) 50%, transparent);
        border-radius: var(--radius-md);
        background: color-mix(in oklch, var(--status-error) 14%, transparent);
        color: var(--ink-primary);
        padding: var(--space-2) var(--space-3);
        font-family: var(--font-ui);
      }
      .chunk-preview {
        margin-top: var(--space-1);
        padding: var(--space-2);
        border: 1px solid var(--border-hairline);
        border-radius: var(--radius-md);
        background: var(--surface-card);
        font-family: var(--font-caption);
        color: var(--ink-muted);
      }
      @media (max-width: 700px) {
        .panel {
          inset: 0;
          width: 100%;
          height: 100%;
          border-radius: 0;
          right: 0;
          bottom: 0;
        }
        .launcher {
          width: 48px;
          height: 48px;
          right: 16px;
          bottom: 16px;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 1ms !important;
          transition-duration: 1ms !important;
        }
      }
    </style>
  </head>
  <body>
    <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
      <symbol id="eigenx-mark" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="36" stroke="currentColor" stroke-width="1.5"/>
        <line x1="25" y1="25" x2="75" y2="75" stroke="currentColor" stroke-width="1.8" stroke-linecap="square"/>
        <line x1="75" y1="25" x2="25" y2="75" stroke="currentColor" stroke-width="1.8" stroke-linecap="square"/>
        <circle cx="50" cy="50" r="2.5" fill="currentColor"/>
      </symbol>
    </svg>

    <div id="backdrop" class="backdrop" aria-hidden="true"></div>
    <button type="button" id="launcher" class="launcher" aria-label="Open Eigen" aria-expanded="false">
      <span class="pulse-dot"></span>
      <svg viewBox="0 0 100 100" fill="none" width="28" height="28" aria-hidden="true">
        <use href="#eigenx-mark"></use>
      </svg>
    </button>
    <div id="panel" class="panel" role="dialog" aria-modal="true" aria-labelledby="head-title" hidden>
      <div class="head">
        <span id="mode-badge" class="mode-badge">Public Eigen</span>
        <div class="head-title-wrap">
          <p class="head-title" id="head-title">Eigen</p>
          <p class="head-sub" id="head-sub"></p>
        </div>
        <button id="close-btn" class="close-btn" type="button" aria-label="Close panel">Close</button>
      </div>
      <div class="chat" id="chat"></div>
      <form class="foot" id="form">
        <textarea id="input" placeholder="Ask a question..." required rows="1"></textarea>
        <button class="submit" type="submit">Send</button>
      </form>
    </div>
    <script type="module" src="./widget.js"></script>
  </body>
</html>
