<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Eigen / EigenX FAB</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0A0A0D;
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
    color: #fff;
    min-height: 100vh;
    overflow: hidden;
  }

  /* ── Ambient page content (just for context) ── */
  .page-hint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    opacity: 0.12;
    pointer-events: none;
    user-select: none;
  }
  .page-hint span {
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
  }

  /* ── FAB Container ── */
  .fab-wrap {
    position: fixed;
    bottom: 28px;
    right: 28px;
    z-index: 1000;
  }

  /* ── The Button ── */
  .fab {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    background: #111116;
    border: 1px solid rgba(255,255,255,0.08);
    cursor: pointer;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* Glow layer — sits behind the button */
  .fab::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 18px;
    background: radial-gradient(circle, rgba(239,159,39,0.12) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.5s ease;
    pointer-events: none;
    z-index: -1;
  }

  /* Outer glow ring — subtle ambient pulse */
  .fab::after {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 16px;
    border: 1px solid rgba(239,159,39,0);
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
  }

  .fab:hover {
    border-color: rgba(239,159,39,0.35);
    transform: scale(1.06);
  }
  .fab:hover::before {
    opacity: 1;
  }
  .fab:hover::after {
    border-color: rgba(239,159,39,0.15);
    inset: -8px;
    border-radius: 20px;
  }

  .fab:active {
    transform: scale(0.97);
  }

  .fab.open {
    border-color: rgba(239,159,39,0.5);
    background: #131318;
  }
  .fab.open::before {
    opacity: 1;
    background: radial-gradient(circle, rgba(239,159,39,0.18) 0%, transparent 70%);
  }

  /* ── SVG Logo inside FAB ── */
  .fab svg {
    width: 32px;
    height: 32px;
    overflow: visible;
  }

  /* Animated draw-in for the logo */
  .fab .logo-circle {
    stroke-dasharray: 377;
    stroke-dashoffset: 377;
    animation: drawCircle 1s cubic-bezier(0.4, 0, 0.2, 1) 0.3s forwards;
  }
  .fab .logo-x1, .fab .logo-x2 {
    stroke-dasharray: 108;
    stroke-dashoffset: 108;
  }
  .fab .logo-x1 {
    animation: drawLine 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.9s forwards;
  }
  .fab .logo-x2 {
    animation: drawLine 0.6s cubic-bezier(0.4, 0, 0.2, 1) 1.1s forwards;
  }
  .fab .logo-dot {
    transform: scale(0);
    transform-origin: center;
    animation: popDot 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 1.5s forwards;
  }

  @keyframes drawCircle {
    to { stroke-dashoffset: 0; }
  }
  @keyframes drawLine {
    to { stroke-dashoffset: 0; }
  }
  @keyframes popDot {
    0%   { transform: scale(0); }
    70%  { transform: scale(1.5); }
    100% { transform: scale(1); }
  }

  /* ── Pulse dot (online indicator) ── */
  .pulse-dot {
    position: absolute;
    top: -3px;
    right: -3px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #EF9F27;
    animation: pulse 2.4s ease-in-out infinite;
  }
  .pulse-dot::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    background: rgba(239, 159, 39, 0.15);
    animation: pulseRing 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50%      { opacity: 1; }
  }
  @keyframes pulseRing {
    0%, 100% { transform: scale(0.8); opacity: 0; }
    50%      { transform: scale(1.2); opacity: 0.4; }
  }

  /* ── Expanded Panel ── */
  .fab-panel {
    position: absolute;
    bottom: 68px;
    right: 0;
    width: 280px;
    background: #111116;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 0;
    opacity: 0;
    transform: translateY(12px) scale(0.96);
    transform-origin: bottom right;
    pointer-events: none;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
  }
  .fab-panel.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: all;
  }

  /* Panel glow */
  .fab-panel::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 15px;
    border: 1px solid rgba(239,159,39,0.08);
    pointer-events: none;
  }
  .fab-panel::after {
    content: '';
    position: absolute;
    bottom: -20px;
    right: 20px;
    width: 80px;
    height: 40px;
    background: radial-gradient(ellipse, rgba(239,159,39,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── Panel Header ── */
  .panel-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .panel-header svg {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }
  .panel-title {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #EF9F27;
    font-weight: 400;
  }
  .panel-status {
    margin-left: auto;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .panel-status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #EF9F27;
    animation: pulse 2.4s ease-in-out infinite;
  }

  /* ── Panel Items ── */
  .panel-items {
    padding: 8px 6px;
  }
  .panel-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    border: 1px solid transparent;
    opacity: 0;
    transform: translateY(8px);
  }
  .panel-item.reveal {
    opacity: 1;
    transform: translateY(0);
    transition: opacity 0.35s ease, transform 0.35s ease, background 0.2s ease, border-color 0.2s ease;
  }
  .panel-item:hover {
    background: rgba(239, 159, 39, 0.04);
    border-color: rgba(239, 159, 39, 0.12);
  }
  .panel-item-icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    background: rgba(239, 159, 39, 0.06);
    border: 1px solid rgba(239, 159, 39, 0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .panel-item-icon svg {
    width: 14px;
    height: 14px;
  }
  .panel-item-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
  }
  .panel-item-desc {
    font-size: 10px;
    letter-spacing: 0.04em;
    color: rgba(255,255,255,0.25);
    margin-top: 2px;
    text-transform: none;
  }
  .panel-item-arrow {
    margin-left: auto;
    font-size: 12px;
    color: rgba(239,159,39,0.3);
    transition: color 0.2s ease, transform 0.2s ease;
  }
  .panel-item:hover .panel-item-arrow {
    color: rgba(239,159,39,0.7);
    transform: translateX(2px);
  }

  /* ── Panel Footer ── */
  .panel-footer {
    padding: 10px 18px 12px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .panel-footer-label {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.12);
  }
  .panel-footer-ver {
    font-size: 9px;
    letter-spacing: 0.1em;
    color: rgba(239,159,39,0.2);
  }

  /* ── Toggle between Eigen and EigenX ── */
  .mode-toggle {
    position: fixed;
    bottom: 32px;
    right: 100px;
    display: flex;
    gap: 2px;
    background: #111116;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 3px;
  }
  .mode-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 6px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.25s ease;
    background: transparent;
    color: rgba(255,255,255,0.25);
  }
  .mode-btn.active {
    background: rgba(239,159,39,0.1);
    color: #EF9F27;
  }
  .mode-btn:hover:not(.active) {
    color: rgba(255,255,255,0.5);
  }
</style>
</head>
<body>

<div class="page-hint">
  <span>click the mark in the bottom right</span>
</div>

<!-- Mode toggle -->
<div class="mode-toggle">
  <button class="mode-btn" data-mode="eigen" onclick="setMode('eigen')">EIGEN</button>
  <button class="mode-btn active" data-mode="eigenx" onclick="setMode('eigenx')">EIGENX</button>
</div>

<!-- FAB -->
<div class="fab-wrap">
  <button class="fab" id="fab" onclick="togglePanel()">
    <div class="pulse-dot"></div>

    <!-- EigenX logo (default) -->
    <svg id="logo-eigenx" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Outer faint ring -->
      <circle cx="50" cy="50" r="46" stroke="rgba(239,159,39,0.06)" stroke-width="0.5"/>
      <!-- Primary circle -->
      <circle class="logo-circle" cx="50" cy="50" r="36" stroke="#EF9F27" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Tick marks -->
      <line x1="50" y1="14" x2="50" y2="10" stroke="rgba(239,159,39,0.3)" stroke-width="0.8"/>
      <line x1="50" y1="86" x2="50" y2="90" stroke="rgba(239,159,39,0.3)" stroke-width="0.8"/>
      <line x1="14" y1="50" x2="10" y2="50" stroke="rgba(239,159,39,0.3)" stroke-width="0.8"/>
      <line x1="86" y1="50" x2="90" y2="50" stroke="rgba(239,159,39,0.3)" stroke-width="0.8"/>
      <!-- X vectors -->
      <line class="logo-x1" x1="25" y1="25" x2="75" y2="75" stroke="#EF9F27" stroke-width="1.8" stroke-linecap="square"/>
      <line class="logo-x2" x1="75" y1="25" x2="25" y2="75" stroke="#EF9F27" stroke-width="1.8" stroke-linecap="square"/>
      <!-- Chevrons -->
      <polyline points="69,24 75,25 71,31" fill="none" stroke="#EF9F27" stroke-width="1" stroke-linecap="square"/>
      <polyline points="31,69 25,75 29,76" fill="none" stroke="#EF9F27" stroke-width="1" stroke-linecap="square"/>
      <polyline points="31,24 25,25 29,31" fill="none" stroke="#EF9F27" stroke-width="1" stroke-linecap="square"/>
      <polyline points="69,76 75,75 71,69" fill="none" stroke="#EF9F27" stroke-width="1" stroke-linecap="square"/>
      <!-- Center dot -->
      <circle class="logo-dot" cx="50" cy="50" r="2.5" fill="#EF9F27"/>
    </svg>

    <!-- Eigen logo (hidden by default) -->
    <svg id="logo-eigen" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none">
      <!-- Ghost axes -->
      <line x1="50" y1="8" x2="50" y2="92" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
      <line x1="8" y1="50" x2="92" y2="50" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
      <!-- Outer square -->
      <rect class="logo-circle" x="18" y="18" width="64" height="64" stroke="#FFFFFF" stroke-width="1.5"
            style="stroke-dasharray:256;stroke-dashoffset:256;animation:drawCircle 1s cubic-bezier(0.4,0,0.2,1) 0.3s forwards"/>
      <!-- Inner dashed echo -->
      <rect x="24" y="24" width="52" height="52" stroke="rgba(255,255,255,0.07)" stroke-width="0.8" stroke-dasharray="3 7" fill="none"/>
      <!-- Eigenvector -->
      <line class="logo-x1" x1="32" y1="68" x2="72" y2="30" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="square"/>
      <!-- Arrow chevron -->
      <polyline points="65,29 72,30 68,37" fill="none" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="square"/>
      <!-- Scalar ticks -->
      <circle cx="42" cy="58" r="0.8" fill="rgba(255,255,255,0.2)"/>
      <circle cx="62" cy="38" r="0.8" fill="rgba(255,255,255,0.2)"/>
      <!-- Origin crosshair -->
      <circle class="logo-dot" cx="50" cy="50" r="1.5" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
      <line x1="46" y1="50" x2="44" y2="50" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
      <line x1="54" y1="50" x2="56" y2="50" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
      <line x1="50" y1="46" x2="50" y2="44" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
      <line x1="50" y1="54" x2="50" y2="56" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
    </svg>
  </button>

  <!-- Expanded panel -->
  <div class="fab-panel" id="panel">
    <div class="panel-header">
      <svg viewBox="0 0 100 100" fill="none">
        <circle cx="50" cy="50" r="36" stroke="#EF9F27" stroke-width="2"/>
        <line x1="28" y1="28" x2="72" y2="72" stroke="#EF9F27" stroke-width="2"/>
        <line x1="72" y1="28" x2="28" y2="72" stroke="#EF9F27" stroke-width="2"/>
        <circle cx="50" cy="50" r="3" fill="#EF9F27"/>
      </svg>
      <span class="panel-title">EigenX</span>
      <span class="panel-status">
        <span class="panel-status-dot"></span>
        online
      </span>
    </div>

    <div class="panel-items">
      <div class="panel-item" style="transition-delay: 0.05s">
        <div class="panel-item-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#EF9F27" stroke-width="1.5">
            <path d="M12 3L20 7.5V16.5L12 21L4 16.5V7.5L12 3Z"/>
            <path d="M12 12L20 7.5M12 12L4 7.5M12 12V21"/>
          </svg>
        </div>
        <div>
          <div class="panel-item-label">Knowledge Graph</div>
          <div class="panel-item-desc">Entity map & relations</div>
        </div>
        <span class="panel-item-arrow">&#8250;</span>
      </div>

      <div class="panel-item" style="transition-delay: 0.12s">
        <div class="panel-item-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#EF9F27" stroke-width="1.5">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
          </svg>
        </div>
        <div>
          <div class="panel-item-label">Signal Fusion</div>
          <div class="panel-item-desc">Cross-source synthesis</div>
        </div>
        <span class="panel-item-arrow">&#8250;</span>
      </div>

      <div class="panel-item" style="transition-delay: 0.19s">
        <div class="panel-item-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#EF9F27" stroke-width="1.5">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
          </svg>
        </div>
        <div>
          <div class="panel-item-label">Whitespace</div>
          <div class="panel-item-desc">Gap & opportunity scan</div>
        </div>
        <span class="panel-item-arrow">&#8250;</span>
      </div>

      <div class="panel-item" style="transition-delay: 0.26s">
        <div class="panel-item-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#EF9F27" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M3 9h18M9 3v18"/>
          </svg>
        </div>
        <div>
          <div class="panel-item-label">Reweight</div>
          <div class="panel-item-desc">Confidence recalibration</div>
        </div>
        <span class="panel-item-arrow">&#8250;</span>
      </div>
    </div>

    <div class="panel-footer">
      <span class="panel-footer-label">R2 Ecosystem</span>
      <span class="panel-footer-ver">v0.1.0</span>
    </div>
  </div>
</div>

<script>
  const fab = document.getElementById('fab');
  const panel = document.getElementById('panel');
  let isOpen = false;

  function togglePanel() {
    isOpen = !isOpen;
    fab.classList.toggle('open', isOpen);
    panel.classList.toggle('visible', isOpen);

    // Stagger reveal items
    const items = panel.querySelectorAll('.panel-item');
    if (isOpen) {
      items.forEach((item, i) => {
        setTimeout(() => item.classList.add('reveal'), 80 + i * 70);
      });
    } else {
      items.forEach(item => item.classList.remove('reveal'));
    }
  }

  function setMode(mode) {
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.mode === mode);
    });
    const eigenx = document.getElementById('logo-eigenx');
    const eigen = document.getElementById('logo-eigen');
    if (mode === 'eigen') {
      eigenx.style.display = 'none';
      eigen.style.display = 'block';
    } else {
      eigenx.style.display = 'block';
      eigen.style.display = 'none';
    }
  }

  // Close on outside click
  document.addEventListener('click', (e) => {
    if (isOpen && !e.target.closest('.fab-wrap')) {
      togglePanel();
    }
  });
</script>
</body>
</html>
