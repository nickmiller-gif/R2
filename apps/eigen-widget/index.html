<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Eigen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
        --canvas: #0A0A0D;
        --surface: #111116;
        --elevated: #0F0F14;
        --border: rgba(255, 255, 255, 0.08);
        --border-hover: rgba(239, 159, 39, 0.35);
        --muted: rgba(255, 255, 255, 0.32);
        --hint: rgba(255, 255, 255, 0.18);
        --fg: #FFFFFF;
        --accent: #EF9F27;
        --accent-hover: #BA7517;
        --accent-dark: #07080A;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--font-mono);
        background: var(--canvas);
        color: var(--fg);
        font-size: 12px;
        letter-spacing: 0.08em;
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(239,159,39,0.2); }

      /* Backdrop */
      .backdrop {
        position: fixed;
        inset: 0;
        background: transparent;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.25s ease, background 0.25s ease;
      }
      .backdrop.open {
        pointer-events: auto;
        opacity: 1;
        background: rgb(0 0 0 / 0.5);
      }

      /* FAB Launcher */
      .launcher {
        position: fixed;
        bottom: 1.35rem;
        right: 1.35rem;
        z-index: 40;
        width: 56px;
        height: 56px;
        border: 1px solid var(--border);
        border-radius: 14px;
        cursor: pointer;
        background: var(--surface);
        color: var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        padding: 0;
        outline: none;
      }
      .launcher::before {
        content: '';
        position: absolute;
        inset: -6px;
        border-radius: 18px;
        background: radial-gradient(circle, rgba(239,159,39,0.1) 0%, transparent 70%);
        opacity: 0;
        transition: opacity 0.4s ease;
        pointer-events: none;
      }
      .launcher:hover {
        border-color: var(--border-hover);
        transform: scale(1.05);
      }
      .launcher:hover::before {
        opacity: 1;
      }
      .launcher:focus-visible {
        box-shadow: 0 0 0 1px rgba(239,159,39,0.5);
      }
      .launcher[aria-expanded='true'] {
        border-color: rgba(239,159,39,0.5);
        background: #131318;
      }
      .launcher[aria-expanded='true']::before {
        opacity: 1;
      }
      .launcher svg {
        width: 28px;
        height: 28px;
      }

      /* Pulse dot */
      .pulse-dot {
        position: absolute;
        top: -3px;
        right: -3px;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent);
        animation: pulse 2.4s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.35; }
        50%      { opacity: 0.7; }
      }

      /* Panel */
      .panel {
        position: fixed;
        z-index: 50;
        right: 1rem;
        bottom: 5.5rem;
        width: min(100vw - 2rem, 22rem);
        max-height: min(70vh, 34rem);
        display: flex;
        flex-direction: column;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: var(--surface);
        overflow: hidden;
        opacity: 0;
        transform: translateY(12px) scale(0.97);
        pointer-events: none;
        transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .panel.open {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: auto;
      }

      /* Header */
      .head {
        flex-shrink: 0;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .head-logo {
        width: 20px;
        height: 20px;
        flex-shrink: 0;
      }
      .head h2 {
        margin: 0;
        font-family: var(--font-mono);
        font-size: 10px;
        font-weight: 400;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--accent);
      }
      .head p {
        margin: 0;
        margin-left: auto;
        font-size: 9px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--hint);
      }

      /* Chat area */
      .chat {
        flex: 1;
        overflow: auto;
        padding: 12px;
        background: var(--canvas);
      }

      /* Messages */
      .msg {
        margin: 8px 0;
        padding: 10px 14px;
        border-radius: 10px;
        max-width: 92%;
        white-space: pre-wrap;
        font-size: 12px;
        letter-spacing: 0.08em;
        line-height: 1.55;
        animation: msg-in 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      @keyframes msg-in {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .user {
        margin-left: auto;
        background: var(--accent);
        color: var(--accent-dark);
        border-bottom-right-radius: 4px;
      }
      .bot {
        margin-right: auto;
        background: var(--elevated);
        border: 1px solid var(--border);
        color: var(--fg);
        border-bottom-left-radius: 4px;
      }
      .meta {
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--hint);
        margin-top: 6px;
      }

      /* Footer / Input */
      .foot {
        flex-shrink: 0;
        display: flex;
        gap: 8px;
        padding: 10px;
        border-top: 1px solid var(--border);
        background: var(--surface);
      }
      .foot textarea {
        flex: 1;
        resize: none;
        min-height: 42px;
        max-height: 96px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--elevated);
        color: var(--fg);
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.08em;
        transition: border-color 0.2s ease;
      }
      .foot textarea::placeholder {
        color: var(--hint);
      }
      .foot textarea:focus {
        outline: none;
        border-color: rgba(239, 159, 39, 0.5);
      }
      .foot button[type='submit'] {
        align-self: flex-end;
        min-width: 60px;
        padding: 10px 14px;
        border: none;
        border-radius: 10px;
        background: var(--accent);
        color: var(--accent-dark);
        font-family: var(--font-mono);
        font-weight: 500;
        font-size: 10px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 0.2s ease;
      }
      .foot button[type='submit']:hover {
        background: var(--accent-hover);
      }
      .foot button[type='submit']:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <!-- Shared SVG symbol for the EigenX circle-X logo mark -->
    <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
      <symbol id="eigenx-mark" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="36" stroke="#EF9F27" stroke-width="1.5"/>
        <line x1="25" y1="25" x2="75" y2="75" stroke="#EF9F27" stroke-width="1.8" stroke-linecap="square"/>
        <line x1="75" y1="25" x2="25" y2="75" stroke="#EF9F27" stroke-width="1.8" stroke-linecap="square"/>
        <circle cx="50" cy="50" r="2.5" fill="#EF9F27"/>
      </symbol>
    </svg>

    <div id="backdrop" class="backdrop" aria-hidden="true"></div>
    <button type="button" id="launcher" class="launcher" aria-label="Open chat" aria-expanded="false">
      <span class="pulse-dot"></span>
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <use href="#eigenx-mark"/>
      </svg>
    </button>
    <div id="panel" class="panel" role="dialog" aria-modal="true" aria-labelledby="head-title" hidden>
      <div class="head">
        <svg class="head-logo" viewBox="0 0 100 100" fill="none">
          <use href="#eigenx-mark"/>
        </svg>
        <h2 id="head-title">Eigen</h2>
        <p id="head-sub"></p>
      </div>
      <div class="chat" id="chat"></div>
      <form class="foot" id="form">
        <textarea id="input" placeholder="Message Eigen..." required rows="1"></textarea>
        <button type="submit">Send</button>
      </form>
    </div>
    <script type="module" src="./widget.js"></script>
  </body>
</html>
