name: Deploy to Supabase

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  actions: read
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false # never cancel an in-flight deploy

jobs:
  # Gate: wait for the CI workflow for this same commit
  ci_gate:
    name: Wait for CI workflow
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Wait for CI to complete
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;
            const workflowId = 'ci.yml';
            const timeoutMs = 20 * 60 * 1000;
            const intervalMs = 15 * 1000;
            const started = Date.now();

            while (Date.now() - started < timeoutMs) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflowId,
                head_sha: sha,
                event: 'push',
                per_page: 10,
              });

              const run = data.workflow_runs.find((r) => r.head_sha === sha);

              if (!run) {
                core.info(`No CI run found for ${sha} yet. Retrying in ${intervalMs / 1000}s...`);
              } else if (run.status !== 'completed') {
                core.info(`CI run ${run.id} status is ${run.status}. Retrying in ${intervalMs / 1000}s...`);
              } else if (run.conclusion === 'success') {
                core.info(`CI run ${run.id} succeeded.`);
                return;
              } else {
                core.setFailed(`CI run ${run.id} completed with conclusion: ${run.conclusion}`);
                return;
              }

              await new Promise((resolve) => setTimeout(resolve, intervalMs));
            }

            core.setFailed(`Timed out after ${timeoutMs / 60000} minutes waiting for CI workflow on ${sha}.`);

  deploy:
    name: Deploy migrations & edge functions
    needs: ci_gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production # requires manual approval in repo settings

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v6

      # Deploy uses `environment: production`. GitHub resolves secrets with
      # **environment secrets overriding repository secrets** for the same name.
      # If preflight still says Unauthorized after rotating the token, update
      # **Settings → Environments → production → Environment secrets**, not only
      # **Settings → Secrets and variables → Actions** (see deploy job `environment:`).
      #
      # Pasted tokens often include a trailing newline — strip CR/LF so the CLI
      # does not send `sbp_…\n` to the API ([Pitfall A1]).
      - name: Normalize Supabase credentials
        shell: bash
        run: |
          set -euo pipefail
          token=$(printf '%s' "${SUPABASE_ACCESS_TOKEN:-}" | tr -d '\r\n')
          project_ref=$(printf '%s' "${SUPABASE_PROJECT_REF:-}" | tr -d '\r\n')
          db_password=$(printf '%s' "${SUPABASE_DB_PASSWORD:-}" | tr -d '\r\n')

          if [ -z "$token" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is empty after trimming. Add it under **Settings → Environments → production → Environment secrets** (this job uses \`environment: production\`). If you only updated a repository secret, either remove the stale environment override or paste the same value into the production environment."
            exit 1
          fi
          if [ -z "$project_ref" ]; then
            echo "::error::SUPABASE_PROJECT_REF is empty. Set it on the **production** environment (same place as SUPABASE_ACCESS_TOKEN)."
            exit 1
          fi
          if [ -z "$db_password" ]; then
            echo "::error::SUPABASE_DB_PASSWORD is empty. Set it on the **production** environment (required for \`supabase link\`)."
            exit 1
          fi

          {
            echo "SUPABASE_ACCESS_TOKEN<<__GITHUB_ENV_EOF__"
            printf '%s' "$token"
            echo
            echo "__GITHUB_ENV_EOF__"
            echo "SUPABASE_PROJECT_REF<<__GITHUB_ENV_EOF__"
            printf '%s' "$project_ref"
            echo
            echo "__GITHUB_ENV_EOF__"
            echo "SUPABASE_DB_PASSWORD<<__GITHUB_ENV_EOF__"
            printf '%s' "$db_password"
            echo
            echo "__GITHUB_ENV_EOF__"
          } >> "$GITHUB_ENV"

      - name: Resolve Supabase CLI version
        id: cli_version
        # Reads the single source of truth so CI (typegen / drift checks) and
        # Deploy run the exact same CLI. April 2026 postmortem: when deploy was
        # pinned to 2.84.2 and CI typegen to 2.89.0, a wildcard-column schema
        # addition that 2.84 serialized differently made CI fail on drift while
        # deploy silently kept pushing, and the repo's database.types.ts drifted
        # from the live schema for eight merges in a row.
        run: |
          VERSION="$(bash scripts/supabase-cli-version.sh)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: ${{ steps.cli_version.outputs.version }}

      - name: Preflight — Supabase CLI auth
        run: |
          set -euo pipefail
          if ! supabase projects list >/dev/null 2>&1; then
            echo "::error::Supabase CLI is not authorized (\`supabase projects list\` failed). Checklist: (1) Mint a new token at https://supabase.com/dashboard/account/tokens with access to project **$SUPABASE_PROJECT_REF**. (2) This workflow uses \`environment: production\` — set **SUPABASE_ACCESS_TOKEN** under **Settings → Environments → production → Environment secrets** (environment secrets override repository secrets with the same name). (3) Ensure the secret value has no accidental spaces or line breaks — the **Normalize Supabase credentials** step strips CR/LF. (4) Confirm **SUPABASE_PROJECT_REF** matches the Eigen/R2 project ref."
            exit 1
          fi
          echo "Supabase CLI authenticated successfully."

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Report R2 migration sync state
        # The Supabase project zudslxucibosjwefojtm is shared with the `works.*`
        # schema apps. Those apps apply migrations via their own channels (their
        # CI / Dashboard), which writes to the same `supabase_migrations.schema_migrations`
        # table — so vanilla `supabase db push` from R2 hits the sync-guard:
        #   "Remote migration versions not found in local migrations directory"
        # Marking remote-only versions as `reverted` would fight the `works.*`
        # apps every cycle (see their next push would re-apply the same DDL).
        #
        # R2 instead applies its own migrations directly via the Supabase MCP
        # (`apply_migration`) out of band from CI. This step only reports the
        # sync state so reviewers can see which R2 migrations are still
        # unapplied (should be none in steady state) and spot drift early.
        #
        # See docs/production-deploy-checklist.md § "R2 migrations on a shared project"
        # for the operator runbook.
        run: |
          set -euo pipefail

          LOCAL_VERSIONS=$(ls supabase/migrations/*.sql 2>/dev/null \
            | xargs -n1 basename \
            | awk -F_ '{print $1}' \
            | sort -u)

          REMOTE_VERSIONS=$(supabase migration list --linked \
            | awk -F'|' 'NR > 3 && NF >= 2 { gsub(/^[ \t]+|[ \t]+$/, "", $2); if ($2 ~ /^[0-9]{12,14}$/) print $2 }' \
            | sort -u)

          LOCAL_UNAPPLIED=$(comm -23 <(echo "$LOCAL_VERSIONS") <(echo "$REMOTE_VERSIONS"))
          echo "### R2 migration sync" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -z "$LOCAL_UNAPPLIED" ]; then
            echo "All R2 migration files are already applied on the live project." | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "Unapplied R2 migration versions (apply via Supabase MCP \`apply_migration\` before this deploy is considered complete):" | tee -a "$GITHUB_STEP_SUMMARY"
            echo "$LOCAL_UNAPPLIED" | sed 's/^/  - /' | tee -a "$GITHUB_STEP_SUMMARY"
            echo ""
            echo "::warning title=Unapplied R2 migrations::Found $(echo "$LOCAL_UNAPPLIED" | wc -l | tr -d ' ') migration file(s) not yet in supabase_migrations.schema_migrations. Edge-function deploy will proceed but run-time behavior may depend on schema not yet in place."
          fi

      - name: Deploy edge functions
        run: |
          # `oracle-whitespace-runs` remains skipped until the Deno bundling blocker
          # called out in docs/production-deploy-checklist.md is resolved.
          SKIP_FUNCTIONS_REGEX="^(_shared|oracle-whitespace-runs)$"
          # Functions that must deploy with verify_jwt=false (gateway lets the
          # request through; the function does its own auth — widget tokens, HMAC,
          # custom cron headers, or RLS-evaluated anon reads).
          #
          # IMPORTANT: `supabase functions deploy <name>` does NOT read
          # per-function verify_jwt from config.toml — without `--no-verify-jwt`
          # the CLI defaults verify_jwt=TRUE. config.toml is ALSO gitignored, so
          # it does not exist in CI. A previous hardcoded 6-function allowlist
          # therefore left every other should-be-false function (autonomous-*,
          # oracle-*, eigen-ingest, meg-*, charter-*, …) deployed verify_jwt=true
          # on every push to main — gateway-401'ing cron/HMAC/public callers and
          # silently breaking the autonomous loop, KB-four ingest, and the Oracle
          # pipeline. The tracked file below is the CI source of truth (generated
          # from config.toml; keep in sync when adding no-verify functions).
          # Self-heal companion: scripts/fix-verify-jwt-drift.mjs.
          mapfile -t NO_VERIFY < <(grep -vE '^[[:space:]]*(#|$)' supabase/functions-no-verify-jwt.txt)
          echo "Functions pinned verify_jwt=false (tracked list): ${#NO_VERIFY[@]}"
          is_no_verify() { local f="$1"; for n in "${NO_VERIFY[@]}"; do [ "$n" = "$f" ] && return 0; done; return 1; }
          for dir in supabase/functions/*/; do
            fn_name=$(basename "$dir")
            # skip shared and known non-deployable legacy function
            if [[ "$fn_name" =~ $SKIP_FUNCTIONS_REGEX ]]; then
              echo "Skipping $fn_name"
              continue
            fi
            echo "::group::Deploying $fn_name"
            if is_no_verify "$fn_name"; then
              supabase functions deploy "$fn_name" --no-verify-jwt
            else
              supabase functions deploy "$fn_name"
            fi
            echo "::endgroup::"
          done

      - name: Re-pin verify_jwt to config.toml (belt-and-suspenders)
        run: node scripts/fix-verify-jwt-drift.mjs || true

      - name: Verify deployment
        run: |
          echo "## Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Project:** $SUPABASE_PROJECT_REF" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Triggered by:** ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Edge Functions Deployed" >> "$GITHUB_STEP_SUMMARY"
          for dir in supabase/functions/*/; do
            fn_name=$(basename "$dir")
            if [ "$fn_name" != "_shared" ]; then
              echo "- \`$fn_name\`" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
